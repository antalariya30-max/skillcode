<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../other_pages/count.css">
</head>

<body>
  <section class="stats-section">

    <div class="stats-box">

      <div class="stat-item">

        <h2 class="stat-number">
          <span class="prefix">$</span>
          <span class="count" data-target="75">0</span>
          <span class="suffix">million</span>
        </h2>

        <h3 class="stat-title">Revenue Growth</h3>

        <p class="stat-desc">
          Generated over $50 million in additional revenue for our client.
        </p>

      </div>

      <div class="divider"></div>

      <div class="stat-item">
        <h2 class="stat-number">
          <span class="count" data-target="97">0</span><span>%</span>
        </h2>
        <h3 class="stat-title">Client Satisfaction</h3>
        <p class="stat-desc">
          97% client satisfaction rate across all marketing campaigns.
        </p>
      </div>

      <div class="divider"></div>

      <div class="stat-item">

        <h2 class="stat-number">
          <span class="count" data-target="2000">0</span>
          <span class="plus">+</span>
        </h2>
        <h3 class="stat-title">Conversion Rate</h3>
        <p class="stat-desc">
          Successfully managed and executed 2,000+ marketing campaigns.
        </p>
      </div>

    </div>

  </section>
  <script src="../other_pages/count.js"></script>
</body>

</html>
